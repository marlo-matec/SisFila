<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo Quadrado Arredondado (Slate 900) -->
  <rect width="512" height="512" rx="100" fill="#0f172a"/>
  
  <!-- Ícone Layers (Centralizado e Escalado) -->
  <!-- Original Lucide: viewBox 0 0 24 24 -->
  <g transform="translate(64, 64) scale(16)" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Camada Superior (Preenchida levemente) -->
    <polygon points="12 2 2 7 12 12 22 7 12 2" fill="#6366f1" fill-opacity="0.2"/>
    <!-- Camada do Meio -->
    <polyline points="2 17 12 22 22 17" />
    <!-- Camada Inferior -->
    <polyline points="2 12 12 17 22 12" />
  </g>
</svg>